name: Build bot
on:
  push:
    tags:
      - v*
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Authenticate at GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docker image and push
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64 -t "ghcr.io/${{ github.repository }}:latest" -f docker/Dockerfile .
      - name: Build docker image and push (stable)
        if: ${{ !contains(github.ref, '-PR-') }}
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64 -t "ghcr.io/${{ github.repository }}:stable" -f docker/Dockerfile .
