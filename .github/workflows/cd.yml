name: Build bot
on:
  push:
    tags:
      - v*
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Authenticate at GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docker image and push
        run: |
          docker build . -f docker/Dockerfile -t "ghcr.io/${{ github.repository }}:latest"
          docker push "ghcr.io/${{ github.repository }}:latest"
      - name: Build docker image and push (stable)
        if: ${{ !contains(github.ref, '-PR-') }}
        run: |
          docker build . -f docker/Dockerfile -t "ghcr.io/${{ github.repository }}:stable"
          docker push "ghcr.io/${{ github.repository }}:stable"
